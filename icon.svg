<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0d4fc;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Speech bubble body -->
  <path d="
    M 130 140
    Q 130 108, 162 108
    L 350 108
    Q 382 108, 382 140
    L 382 290
    Q 382 322, 350 322
    L 210 322
    L 170 370
    L 175 322
    L 162 322
    Q 130 322, 130 290
    Z
  " fill="white" fill-opacity="0.97"/>

  <!-- Sound wave - 3 bars, centered in bubble -->
  <!-- Bar 1 (left, short) -->
  <rect x="200" y="192" width="14" height="56" rx="7" fill="url(#bg)"/>

  <!-- Bar 2 (center, tall) -->
  <rect x="249" y="168" width="14" height="104" rx="7" fill="url(#bg)"/>

  <!-- Bar 3 (right, medium) -->
  <rect x="298" y="182" width="14" height="76" rx="7" fill="url(#bg)"/>
</svg>
