<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natter Overlay</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div class="overlay-pill" id="pill">

    <!-- Cancel (X) button -->
    <button class="btn-cancel" id="btnCancel" title="Cancel recording"
            onclick="handleCancel()">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <line x1="1" y1="1" x2="9" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="9" y1="1" x2="1" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Audio level bars -->
    <div class="bars-container" id="barsContainer">
      <div class="bar" data-index="0"></div>
      <div class="bar" data-index="1"></div>
      <div class="bar" data-index="2"></div>
      <div class="bar" data-index="3"></div>
      <div class="bar" data-index="4"></div>
      <div class="bar" data-index="5"></div>
      <div class="bar" data-index="6"></div>
      <div class="bar" data-index="7"></div>
      <div class="bar" data-index="8"></div>
      <div class="bar" data-index="9"></div>
    </div>

    <!-- Stop / process button -->
    <button class="btn-stop" id="btnStop" title="Stop & transcribe"
            onclick="handleStop()">
      <div class="stop-square"></div>
    </button>

  </div>

  <script src="overlay.js"></script>
</body>
</html>
