name: Build macOS App (Signed with Developer ID)


on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'


permissions:
  contents: write


jobs:
  build-macos:
    runs-on: macos-14


    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller




      - name: Import code signing certificate
        run: |
          # Create temporary keychain
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD || 'temp123' }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD || 'temp123' }}" build.keychain

          # Import certificate
          echo "${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD || 'temp123' }}" build.keychain

          # Verify certificate is available
          security find-identity -v -p codesigning

          echo "✅ Code signing certificate imported"


      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting __version__ to $VERSION"
          python -c "
          import re, pathlib
          p = pathlib.Path('src/__init__.py')
          t = p.read_text()
          new = re.sub(r'__version__\s*=\s*\"[^\"]*\"', f'__version__ = \"$VERSION\"', t)
          if new == t:
              raise SystemExit('Could not find __version__ in src/__init__.py')
          p.write_text(new)
          "
          grep __version__ src/__init__.py

      - name: Build .app
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          echo "=== Verifying Python version ==="
          python --version
          python -c "import sys; print(f'Python: {sys.version}')"
          echo "=== Building with PyInstaller ==="
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "Building with code signing: $SIGNING_IDENTITY"
          else
            echo "Building without code signing (adhoc)"
          fi
          python -m PyInstaller --noconfirm --clean Waffler_mac.spec

          # Manually sign the app with hardened runtime and entitlements
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "=== Manually signing app with hardened runtime ==="

            # Sign everything recursively from inside out
            # Sign all .so files
            find dist/Waffler.app -type f -name "*.so" -print0 | while IFS= read -r -d '' file; do
              echo "Signing $file"
              codesign --sign "$SIGNING_IDENTITY" --force --options runtime --timestamp "$file" || true
            done

            # Sign all .dylib files
            find dist/Waffler.app -type f -name "*.dylib" -print0 | while IFS= read -r -d '' file; do
              echo "Signing $file"
              codesign --sign "$SIGNING_IDENTITY" --force --options runtime --timestamp "$file" || true
            done

            # Sign all frameworks (like Python.framework)
            find dist/Waffler.app/Contents/Frameworks -type f -perm +111 -print0 2>/dev/null | while IFS= read -r -d '' file; do
              echo "Signing framework binary $file"
              codesign --sign "$SIGNING_IDENTITY" --force --options runtime --timestamp "$file" || true
            done

            # Sign all executables in MacOS
            find dist/Waffler.app/Contents/MacOS -type f -perm +111 -print0 | while IFS= read -r -d '' file; do
              echo "Signing executable $file"
              codesign --sign "$SIGNING_IDENTITY" --force --options runtime --entitlements entitlements.plist --timestamp "$file" || true
            done

            # Finally sign the app bundle itself
            echo "Signing app bundle..."
            codesign --sign "$SIGNING_IDENTITY" \
                     --force \
                     --options runtime \
                     --entitlements entitlements.plist \
                     --timestamp \
                     dist/Waffler.app
          fi

          # Verify signature
          codesign -dvvv dist/Waffler.app 2>&1 | grep -E "Identifier|Authority|Signature" || true


      - name: Package DMG
        run: |
          mkdir -p dist-installer
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="Waffler-${VERSION}-mac.dmg"
          TMP_DMG="tmp-${DMG_NAME}"

          # Create temporary DMG staging directory
          mkdir -p dmg-staging
          cp -R dist/Waffler.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          # Create temporary DMG
          hdiutil create -volname "Waffler" \
            -srcfolder dmg-staging \
            -ov -format UDRW \
            "dist-installer/${TMP_DMG}"

          # Mount it
          hdiutil attach "dist-installer/${TMP_DMG}"

          # Set background and icon positions using AppleScript
          echo '
          tell application "Finder"
            tell disk "Waffler"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {400, 100, 1000, 500}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 100
              set position of item "Waffler.app" of container window to {150, 200}
              set position of item "Applications" of container window to {450, 200}
              update without registering applications
              close
            end tell
          end tell
          ' | osascript

          # Wait for changes to apply
          sleep 2

          # Unmount
          hdiutil detach "/Volumes/Waffler"

          # Convert to compressed read-only
          hdiutil convert "dist-installer/${TMP_DMG}" \
            -format UDZO \
            -o "dist-installer/${DMG_NAME}"

          # Clean up
          rm -rf dmg-staging "dist-installer/${TMP_DMG}"


      - name: Sign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="Waffler-${VERSION}-mac.dmg"
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "Signing DMG with: $SIGNING_IDENTITY"
            codesign --sign "$SIGNING_IDENTITY" "dist-installer/${DMG_NAME}"
            codesign --verify --verbose "dist-installer/${DMG_NAME}"
            echo "✅ DMG signed successfully"
          else
            echo "⚠️  No signing identity - skipping DMG signing"
          fi


      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="Waffler-${VERSION}-mac.dmg"

          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_PASSWORD" ]; then
            echo "⚠️  Skipping notarization - Apple ID or password not configured"
            exit 0
          fi

          echo "Submitting DMG for notarization..."
          set +e  # Temporarily disable exit-on-error to capture output
          SUBMIT_OUTPUT=$(xcrun notarytool submit "dist-installer/${DMG_NAME}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 10m 2>&1)
          NOTARY_EXIT_CODE=$?
          set -e  # Re-enable exit-on-error

          echo "$SUBMIT_OUTPUT"

          if [ $NOTARY_EXIT_CODE -ne 0 ]; then
            echo "❌ Notarization submission failed with exit code $NOTARY_EXIT_CODE"
            echo "This usually means:"
            echo "  - Apple app-specific password expired (regenerate at appleid.apple.com)"
            echo "  - Invalid Apple ID or Team ID"
            echo "  - Network connectivity issues"
            exit 1
          fi

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization succeeded
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "✅ Notarization accepted"
          else
            echo "❌ Notarization failed or invalid"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID"
            else
              echo "No submission ID found - could not fetch detailed log"
            fi
            exit 1
          fi

          echo "Waiting 30s for Apple's servers to propagate..."
          sleep 30

          echo "Stapling notarization ticket to DMG (with retries)..."
          for i in 1 2 3 4 5; do
            if xcrun stapler staple "dist-installer/${DMG_NAME}"; then
              echo "✅ Stapling succeeded on attempt $i"
              break
            else
              echo "⚠️  Stapling attempt $i failed, waiting 30s..."
              sleep 30
            fi
          done

          xcrun stapler validate "dist-installer/${DMG_NAME}"
          echo "✅ DMG notarized and stapled successfully"


      - name: Upload DMG artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Waffler-mac
          path: dist-installer/*.dmg


      - name: Publish release on tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist-installer/*.dmg
          generate_release_notes: true

