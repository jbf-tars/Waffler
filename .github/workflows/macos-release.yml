name: Build macOS App (unsigned for now)


on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'


permissions:
  contents: write


jobs:
  build-macos:
    runs-on: macos-14


    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller


      - name: Install create-dmg
        run: |
          brew install create-dmg


      - name: Build .app
        run: |
          pyinstaller --noconfirm --clean Waffler_mac.spec


      - name: Package DMG (unsigned)
        run: |
          mkdir -p dist-installer
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="Waffler-${VERSION}-mac-unsigned.dmg"
          create-dmg \
            --volname "Waffler" \
            --window-pos 200 120 \
            --window-size 800 500 \
            --icon-size 100 \
            --icon "Waffler.app" 200 220 \
            --hide-extension "Waffler.app" \
            --app-drop-link 600 220 \
            "dist-installer/${DMG_NAME}" \
            "dist/"


      - name: Upload DMG artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Waffler-mac-unsigned
          path: dist-installer/*.dmg


      - name: Publish release on tag
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist-installer/*.dmg
          generate_release_notes: false

