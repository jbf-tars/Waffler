name: Build macOS App (unsigned for now)


on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'


permissions:
  contents: write


jobs:
  build-macos:
    runs-on: macos-14


    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller


      - name: Install create-dmg
        run: |
          brew install create-dmg


      - name: Import code signing certificate
        if: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT != '' }}
        run: |
          # Create temporary keychain
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD || 'temp123' }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD || 'temp123' }}" build.keychain

          # Import certificate
          echo "${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD || 'temp123' }}" build.keychain

          # Verify certificate is available
          security find-identity -v -p codesigning

          echo "✅ Code signing certificate imported"


      - name: Build .app
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          echo "=== Verifying Python version ==="
          python --version
          python -c "import sys; print(f'Python: {sys.version}')"
          echo "=== Building with PyInstaller ==="
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "Building with code signing: $SIGNING_IDENTITY"
          else
            echo "Building without code signing (adhoc)"
          fi
          python -m PyInstaller --noconfirm --clean Waffler_mac.spec

          # Verify signature
          codesign -dvvv dist/Waffler.app 2>&1 | grep -E "Identifier|Authority|Signature" || true


      - name: Package DMG (unsigned)
        run: |
          mkdir -p dist-installer
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="Waffler-${VERSION}-mac-unsigned.dmg"
          create-dmg \
            --volname "Waffler" \
            --window-pos 200 120 \
            --window-size 800 500 \
            --icon-size 100 \
            --icon "Waffler.app" 200 220 \
            --hide-extension "Waffler.app" \
            --app-drop-link 600 220 \
            "dist-installer/${DMG_NAME}" \
            "dist/"


      - name: Upload DMG artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Waffler-mac-unsigned
          path: dist-installer/*.dmg


      - name: Publish release on tag
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist-installer/*.dmg
          generate_release_notes: false

